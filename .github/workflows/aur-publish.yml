name: Publish to AUR

# Fires after the Release workflow succeeds on a v* tag.
# Bumps pkgver in aur/PKGBUILD via an auto-merging PR (master is
# protected by a PR-required ruleset), then publishes to AUR.
on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  publish:
    name: Publish ficflow-bin
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version from tag
        id: version
        run: |
          VERSION="${{ github.event.workflow_run.head_branch }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump pkgver in aur/PKGBUILD
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: ficflow-bin
          pkgbuild: ./aur/PKGBUILD
          assets: aur/ficflow.desktop
          commit_username: Yves Motteux
          commit_email: yvesmotteux@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "ficflow-bin ${{ steps.version.outputs.version }}"
          updpkgsums: true
          # updpkgsums downloads each `source=()` URL into the AUR clone dir.
          # Strip those before commit — AUR rejects blobs > 488 KiB and the
          # binary is ~30 MB. Glob excludes ficflow.desktop (no hyphen).
          post_process: |
            rm -f ficflow-* LICENSE-*

      - name: Open PR to sync the bump on master
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: aur-bump/${{ steps.version.outputs.version }}
          base: master
          title: ":bookmark: Bump aur/PKGBUILD to ${{ steps.version.outputs.version }}"
          commit-message: ":bookmark: Bump aur/PKGBUILD to ${{ steps.version.outputs.version }}"
          body: |
            Auto-generated after the release of v${{ steps.version.outputs.version }}.
            Keeps the in-repo PKGBUILD in sync with what's published to AUR.
          delete-branch: true

      - name: Enable auto-merge on the bump PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --merge ${{ steps.cpr.outputs.pull-request-number }}
